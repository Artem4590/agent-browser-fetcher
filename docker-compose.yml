services:
  browser:
    build:
      context: ./browser
    image: agent-browser-fetcher-browser:latest
    network_mode: host
    ipc: host
    init: true
    read_only: true
    tmpfs: ["/tmp", "/var", "/root", "/run"]
    environment:
      PORT: "${BROWSER_PORT:-9222}"
      PROXY: "${BROWSER_PROXY:-}"

  fetcher:
    build: .
    image: agent-browser-fetcher:latest
    network_mode: host
    depends_on:
      - browser
    shm_size: "1gb"
    volumes:
      - ./output:/app/output
    command: >-
      https://docs.ozon.ru/api/seller/en/
      --connect-host 127.0.0.1
      --connect-port ${BROWSER_PORT:-9222}
      --warmup-url https://docs.ozon.ru/
      --timeout 60
      --output-format openclaw
      --save-html /app/output/ozon.html
